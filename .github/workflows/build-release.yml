name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  workflow_dispatch:

env:
  PLUGIN_NAME: jdhog
  SOLUTION_NAME: jdhog
  INTERNAL_NAME: jdhog
  RELEASE_DIR: jdhog\bin\x64\Release\jdhog

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Build
        run: |
          dotnet restore -r win "${{ env.SOLUTION_NAME }}.sln"
          dotnet build "${{ env.SOLUTION_NAME }}.sln" --configuration Release --no-restore
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-artifact
          path: |
            ${{ env.RELEASE_DIR }}\latest.zip
            ${{ env.RELEASE_DIR }}\${{ env.INTERNAL_NAME }}.json
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-artifact
          path: artifact

      - name: Determine Release Version
        id: get_version
        shell: bash
        env:
          INTERNAL_NAME: ${{ env.INTERNAL_NAME }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            version="$(python3 -c "import json, os; from pathlib import Path; manifest_path = Path('artifact') / f\"{os.environ['INTERNAL_NAME']}.json\"; manifest = json.loads(manifest_path.read_text(encoding='utf-8')); manifest = manifest[0] if isinstance(manifest, list) else manifest; print(f\"v{manifest['AssemblyVersion']}\")")"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifact/latest.zip
            artifact/${{ env.INTERNAL_NAME }}.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
